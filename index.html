<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego del Impostor P2P Estable</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #162447;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            text-align: center;
            width: 90%;
            max-width: 450px;
        }
        h1 { color: #e43f5a; margin-top: 0; }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            box-sizing: border-box;
        }
        input { background-color: #fff; color: #333; }
        button {
            background-color: #e43f5a;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #ff4b6b; }
        button:disabled { background-color: #555; cursor: not-allowed; }
        .screen { display: none; }
        .active { display: block; }
        .player-list {
            text-align: left;
            background: #1f4068;
            padding: 10px;
            border-radius: 8px;
            margin: 15px 0;
        }
        .role-box {
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
            padding: 20px;
            border-radius: 8px;
        }
        .impostor { background-color: #8b0000; color: #ff4c4c; }
        .civil { background-color: #006400; color: #4cd137; }
        .admin-badge {
            color: #f1c40f;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid #f1c40f;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 5px;
        }
        .code-box {
            background: #101935;
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            word-break: break-all;
            margin: 10px 0;
            font-size: 14px;
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
<div class="container">
    <div id="screen-login" class="screen active">
        <h1>El Impostor</h1>
        <input type="text" id="username" placeholder="Tu nombre...">
        
        <div id="admin-init-box">
            <button onclick="initAsAdmin()">Crear Sala (Solo Angel)</button>
        </div>
        
        <hr style="border-color: #1f4068; margin: 15px 0;">
        
        <div id="player-init-box">
            <p>¿Te une un amigo? Pega el código de sala aquí:</p>
            <input type="text" id="join-code" placeholder="Código de la sala...">
            <button onclick="initAsPlayer()" style="background-color: #1f4068;">Unirse a Sala</button>
        </div>
    </div>

    <div id="screen-lobby" class="screen">
        <h1>Sala de Espera</h1>
        <p>Comparte este código con tus dos amigos:</p>
        <div class="code-box" id="room-code-display">Generando código seguro...</div>
        
        <p>Jugadores (<span id="player-count">1</span>/3):</p>
        <div class="player-list" id="lobby-players"></div>
        
        <div id="admin-controls" style="display: none;">
            <button id="start-btn" onclick="startGame()" disabled>Faltan jugadores</button>
        </div>
        <div id="player-wait-msg">
            <p>Esperando a que Angel inicie la partida...</p>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <h1>¡Partida Iniciada!</h1>
        <p>Tu identidad secreta es:</p>
        <div id="role-display"></div>
        
        <div id="admin-reset-control" style="display: none;">
            <hr style="border-color: #1f4068; margin: 20px 0;">
            <button onclick="resetGame()" style="background-color: #1f4068;">Parar Juego (Reiniciar)</button>
        </div>
    </div>
</div>

<script>
    const palabras = ["Manzana", "Televisor", "Coche", "Estuche", "Fútbol", "Perro", "Playa", "Pizza", "Minecraft", "Impresora 3D"];
    
    let peer = null;
    let connections = []; 
    let connToAdmin = null; 
    
    let currentUser = "";
    let isAdmin = false;
    let listaJugadores = [];

    // Opciones de conexión segura para evitar bloqueos del navegador en HTTPS
    const peerConfig = {
        host: '0.peerjs.com',
        port: 443,
        secure: true,
        pingInterval: 3000
    };

    // 1. EL ADMIN CREA LA SALA
    function initAsAdmin() {
        const name = document.getElementById('username').value.trim();
        if (name.toLowerCase() !== 'angel') {
            return alert("Solo el usuario 'angel' puede crear la sala.");
        }
        currentUser = "Angel";
        isAdmin = true;
        listaJugadores = [currentUser];

        // Forzamos la configuración SSL segura aquí
        peer = new Peer(peerConfig);
        
        peer.on('open', (id) => {
            document.getElementById('room-code-display').innerText = id;
            showScreen('screen-lobby');
            updateLobbyUI();
        });

        peer.on('error', (err) => {
            console.error(err);
            alert("Error crítico de red: " + err.type + ". Prueba a refrescar.");
        });

        peer.on('connection', (conn) => {
            if (listaJugadores.length >= 3) {
                setTimeout(() => conn.close(), 500);
                return;
            }

            connections.push(conn);

            conn.on('data', (data) => {
                if (data.type === 'join') {
                    conn.peerUserName = data.name; 
                    listaJugadores.push(data.name);
                    updateLobbyUI();
                    broadcast({ type: 'update', players: listaJugadores });
                }
            });

            conn.on('close', () => {
                connections = connections.filter(c => c !== conn);
                if (conn.peerUserName) {
                    listaJugadores = listaJugadores.filter(p => p !== conn.peerUserName);
                }
                updateLobbyUI();
                broadcast({ type: 'update', players: listaJugadores });
                
                if (document.getElementById('screen-game').classList.contains('active')) {
                    alert("Un jugador abandonó la partida. Volviendo al lobby.");
                    resetGame();
                }
            });
        });
    }

    // 2. LOS JUGADORES SE UNEN
    function initAsPlayer() {
        const name = document.getElementById('username').value.trim();
        const code = document.getElementById('join-code').value.trim();
        
        if (!name) return alert("Escribe tu nombre.");
        if (name.toLowerCase() === 'angel') return alert("Ese nombre está reservado.");
        if (!code) return alert("Pega el código que te pasó Angel.");

        currentUser = name;
        isAdmin = false;

        // Forzamos la configuración SSL segura aquí también
        peer = new Peer(peerConfig);

        peer.on('open', () => {
            connToAdmin = peer.connect(code, { reliable: true });

            connToAdmin.on('open', () => {
                connToAdmin.send({ type: 'join', name: currentUser });
                showScreen('screen-lobby');
            });

            connToAdmin.on('data', (data) => {
                if (data.type === 'update') {
                    listaJugadores = data.players;
                    updateLobbyUI();
                } else if (data.type === 'start') {
                    showGameScreen(data.impostor, data.palabra);
                } else if (data.type === 'reset') {
                    showScreen('screen-lobby');
                }
            });

            connToAdmin.on('close', () => {
                alert("La sala se ha cerrado. Volviendo al inicio.");
                location.reload(); 
            });
        });

        peer.on('error', (err) => {
            console.error(err);
            alert("No se pudo conectar con la sala. Verifica que el código sea correcto.");
        });
    }

    function broadcast(data) {
        connections.forEach(conn => {
            if (conn.open) conn.send(data);
        });
    }

    function updateLobbyUI() {
        document.getElementById('player-count').innerText = listaJugadores.length;
        const listDiv = document.getElementById('lobby-players');
        listDiv.innerHTML = "";

        listaJugadores.forEach(p => {
            let item = document.createElement('div');
            item.style.margin = "5px 0";
            if (p.toLowerCase() === 'angel') {
                item.innerHTML = `• ${p} <span class="admin-badge">ADMIN</span>`;
            } else {
                item.innerText = `• ${p}`;
            }
            listDiv.appendChild(item);
        });

        if (isAdmin) {
            document.getElementById('admin-controls').style.display = 'block';
            document.getElementById('player-wait-msg').style.display = 'none';
            document.getElementById('start-btn').disabled = listaJugadores.length !== 3;
            if(listaJugadores.length === 3) {
                document.getElementById('start-btn').innerText = "Empezar Juego";
            } else {
                document.getElementById('start-btn').innerText = "Faltan jugadores";
            }
        } else {
            document.getElementById('admin-controls').style.display = 'none';
            document.getElementById('player-wait-msg').style.display = 'block';
        }
    }

    function startGame() {
        if (!isAdmin || listaJugadores.length !== 3) return;

        const randomIndex = Math.floor(Math.random() * 3);
        const impostor = listaJugadores[randomIndex];
        const palabra = palabras[Math.floor(Math.random() * palabras.length)];

        broadcast({ type: 'start', impostor: impostor, palabra: palabra });
        showGameScreen(impostor, palabra);
    }

    function showGameScreen(impostor, palabra) {
        showScreen('screen-game');
        const display = document.getElementById('role-display');

        if (currentUser === impostor) {
            display.innerHTML = `
                <div class="role-box impostor">ERES EL IMPOSTOR 🤫</div>
                <p>No tienes palabra. ¡Camúflate con los civiles antes de que te descubran!</p>
            `;
        } else {
            display.innerHTML = `
                <div class="role-box civil">ERES CIVIL 👥</div>
                <p>Tu palabra secreta es: <strong style="font-size: 20px; color: #4cd137;">${palabra}</strong></p>
                <br><p>¡Describe tu palabra sin decirla directamente para pillar al impostor!</p>
            `;
        }

        if (isAdmin) {
            document.getElementById('admin-reset-control').style.display = 'block';
        } else {
            document.getElementById('admin-reset-control').style.display = 'none';
        }
    }

    function resetGame() {
        if (isAdmin) {
            broadcast({ type: 'reset' });
            showScreen('screen-lobby');
            updateLobbyUI();
        }
    }

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }
</script>
</body>
</html>
