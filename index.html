<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego del Impostor Realtime</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #162447;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            text-align: center;
            width: 90%;
            max-width: 450px;
        }
        h1 { color: #e43f5a; margin-top: 0; }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            box-sizing: border-box;
        }
        input { background-color: #fff; color: #333; }
        button {
            background-color: #e43f5a;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #ff4b6b; }
        button:disabled { background-color: #555; cursor: not-allowed; }
        .screen { display: none; }
        .active { display: block; }
        .player-list {
            text-align: left;
            background: #1f4068;
            padding: 10px;
            border-radius: 8px;
            margin: 15px 0;
        }
        .role-box {
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
            padding: 20px;
            border-radius: 8px;
        }
        .impostor { background-color: #8b0000; color: #ff4c4c; }
        .civil { background-color: #006400; color: #4cd137; }
        .admin-badge {
            color: #f1c40f;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid #f1c40f;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 5px;
        }
    </style>
</head>
<body>
<div class="container">
    <div id="screen-login" class="screen active">
        <h1>El Impostor</h1>
        <p>Introduce tu nombre para entrar a la sala:</p>
        <input type="text" id="username" placeholder="Tu nombre...">
        <button onclick="joinRoom()">Entrar a la Sala</button>
    </div>

    <div id="screen-lobby" class="screen">
        <h1>Sala de Espera</h1>
        <p>Jugadores en la sala (<span id="player-count">0</span>/3):</p>
        <div class="player-list" id="lobby-players"></div>
        
        <div id="admin-controls" style="display: none;">
            <p style="color: #f1c40f;">✨ Tienes el control de Administrador</p>
            <button id="start-btn" onclick="startGame()" disabled>Empezar Juego (Necesitas 3 jugadores)</button>
        </div>
        <div id="player-wait-msg">
            <p>Esperando a que el Admin inicie la partida...</p>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <h1>¡Partida Iniciada!</h1>
        <p>Tu identidad secreta es:</p>
        <div id="role-display"></div>
        
        <div id="admin-reset-control" style="display: none;">
            <hr style="border-color: #1f4068; margin: 20px 0;">
            <button onclick="resetGame()" style="background-color: #1f4068;">Parar Juego (Reiniciar)</button>
        </div>
    </div>
</div>

<script>
    const BIN_URL = "https://api.jsonbin.io/v3/b/6658a5daacd3cb34a8b0cc02";
    const API_KEY = "$2a$10$W23bLgX3bM4fVbY8Z7K2O.6yE8F8M3vMh3Y5z1v2v4v4v4v4v4v4v";

    const palabras = ["Manzana", "Televisor", "Coche", "Estuche", "Fútbol", "Perro", "Playa", "Pizza", "Minecraft", "Impresora 3D"];
    let currentUser = "";
    let localStatus = "login";

    async function getGameState() {
        try {
            const res = await fetch(`${BIN_URL}/latest`, {
                headers: { "X-Master-Key": API_KEY }
            });
            const data = await res.json();
            return data.record;
        } catch (e) {
            console.error("Error leyendo datos:", e);
            return null;
        }
    }

    async function updateGameState(newState) {
        try {
            await fetch(BIN_URL, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "X-Master-Key": API_KEY
                },
                body: JSON.stringify(newState)
            });
        } catch (e) {
            console.error("Error guardando datos:", e);
        }
    }

    async function joinRoom() {
        const input = document.getElementById('username');
        let name = input.value.trim();
        if (!name) return alert("Por favor, escribe un nombre.");
        
        currentUser = name;
        let state = await getGameState();
        if (!state) return alert("Error de conexión con el servidor.");

        // Si el admin no se ha reportado en más de 6 segundos, limpiamos la sala antes de entrar
        const ahora = Date.now();
        if (state.admin_heartbeat && (ahora - state.admin_heartbeat > 6000)) {
            state = { players: [], status: "lobby", impostor: "", palabra: "", admin_heartbeat: 0 };
        }

        if (state.status === 'playing' && !state.players.includes(currentUser)) {
            return alert("Hay una partida en curso. Espera a que termine.");
        }

        if (state.players.length >= 3 && !state.players.includes(currentUser)) {
            return alert("La sala está llena (máximo 3 jugadores).");
        }

        if (!state.players.includes(currentUser)) {
            state.players.push(currentUser);
            if (currentUser.toLowerCase() === 'angel') {
                state.admin_heartbeat = Date.now();
            }
            await updateGameState(state);
        }

        localStatus = "lobby";
        showScreen('screen-lobby');
        processState(state);
    }

    function processState(state) {
        if (!state || localStatus === "login") return;

        // EXPULSIÓN SI EL ADMIN DESAPARECE
        const ahora = Date.now();
        const adminEnLista = state.players.some(p => p.toLowerCase() === 'angel');
        
        // Si no hay admin registrado, o si el admin lleva más de 6 segundos sin dar señales...
        if (!adminEnLista || (state.admin_heartbeat && (ahora - state.admin_heartbeat > 6000))) {
            if (currentUser.toLowerCase() !== 'angel') {
                alert("El administrador ha salido de la sala. Volviendo al inicio.");
                localStatus = "login";
                currentUser = "";
                showScreen('screen-login');
                return;
            }
        }

        if (state.status === 'lobby') {
            if (document.getElementById('screen-game').classList.contains('active')) {
                showScreen('screen-lobby');
            }
            
            document.getElementById('player-count').innerText = state.players.length;
            const listDiv = document.getElementById('lobby-players');
            listDiv.innerHTML = "";
            
            state.players.forEach(p => {
                let item = document.createElement('div');
                item.style.margin = "5px 0";
                if (p.toLowerCase() === 'angel') {
                    item.innerHTML = `• ${p} <span class="admin-badge">ADMIN</span>`;
                } else {
                    item.innerText = `• ${p}`;
                }
                listDiv.appendChild(item);
            });

            if (currentUser.toLowerCase() === 'angel') {
                document.getElementById('admin-controls').style.display = 'block';
                document.getElementById('player-wait-msg').style.display = 'none';
                document.getElementById('start-btn').disabled = state.players.length !== 3;
            } else {
                document.getElementById('admin-controls').style.display = 'none';
                document.getElementById('player-wait-msg').style.display = 'block';
            }
        } 
        
        else if (state.status === 'playing') {
            showScreen('screen-game');
            const display = document.getElementById('role-display');
            
            if (currentUser === state.impostor) {
                display.innerHTML = `
                    <div class="role-box impostor">ERES EL IMPOSTOR 🤫</div>
                    <p>No tienes palabra. ¡Camúflate con los civiles antes de que te descubran!</p>
                `;
            } else {
                display.innerHTML = `
                    <div class="role-box civil">ERES CIVIL 👥</div>
                    <p>Tu palabra secreta es: <strong style="font-size: 20px; color: #4cd137;">${state.palabra}</strong></p>
                    </br><p>¡Describe tu palabra sin decirla directamente para pillar al impostor!</p>
                `;
            }

            if (currentUser.toLowerCase() === 'angel') {
                document.getElementById('admin-reset-control').style.display = 'block';
            } else {
                document.getElementById('admin-reset-control').style.display = 'none';
            }
        }
    }

    async function startGame() {
        let state = await getGameState();
        if (state.players.length !== 3) return;

        state.status = 'playing';
        const randomIndex = Math.floor(Math.random() * 3);
        state.impostor = state.players[randomIndex];
        state.palabra = palabras[Math.floor(Math.random() * palabras.length)];
        if (currentUser.toLowerCase() === 'angel') state.admin_heartbeat = Date.now();

        await updateGameState(state);
    }

    async function resetGame() {
        let state = {
            players: [],
            status: "lobby",
            impostor: "",
            palabra: "",
            admin_heartbeat: 0
        };
        await updateGameState(state);
    }

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    // Bucle principal de sincronización (Cada 2 segundos)
    setInterval(async () => {
        if (localStatus === "login") return;
        
        let state = await getGameState();
        
        // Si yo soy el Admin, actualizo mi "latido" antes de mandar los datos
        if (currentUser.toLowerCase() === 'angel' && state) {
            state.admin_heartbeat = Date.now();
            await updateGameState(state);
        }
        
        processState(state);
    }, 2000);
</script>
</body>
</html>
